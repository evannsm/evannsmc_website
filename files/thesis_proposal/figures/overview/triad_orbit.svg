<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 175 1200 540" font-family="Source Sans Pro, system-ui, sans-serif">
  <defs>
    <radialGradient id="coreFill" cx="50%" cy="50%" r="55%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#e6edf3"/>
    </radialGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-opacity="0.18"/>
    </filter>
  </defs>

  <!-- orbit ring -->
  <circle cx="600" cy="410" r="230" fill="none" stroke="#cdd7df" stroke-width="1.5" stroke-dasharray="4 5"/>

  <!-- core: plant -->
  <g filter="url(#shadow)">
    <circle cx="600" cy="410" r="95" fill="url(#coreFill)" stroke="#003057" stroke-width="3"/>
  </g>
  <text x="600" y="400" text-anchor="middle" font-size="14" font-weight="700" fill="#003057">AERIAL PLANT</text>
  <text x="600" y="422" text-anchor="middle" font-size="12" fill="#516470">Quadrotor · Blimp</text>
  <text x="600" y="442" text-anchor="middle" font-size="11" fill="#7a8894" font-style="italic">uncertain, constrained,</text>
  <text x="600" y="458" text-anchor="middle" font-size="11" fill="#7a8894" font-style="italic">computationally limited</text>

  <!-- three petals -->
  <!-- T1: red — EFFICIENT (top-left) -->
  <g filter="url(#shadow)">
    <circle cx="400" cy="295" r="92" fill="#c0392b" opacity="0.95"/>
  </g>
  <text x="400" y="268" text-anchor="middle" font-size="11" font-weight="700" fill="#fff" letter-spacing="2">THRUST 1</text>
  <text x="400" y="295" text-anchor="middle" font-size="22" font-weight="800" fill="#fff">EFFICIENT</text>
  <text x="400" y="321" text-anchor="middle" font-size="12" fill="#fff" opacity="0.95">Newton–Raphson</text>
  <text x="400" y="338" text-anchor="middle" font-size="12" fill="#fff" opacity="0.95">tracking control</text>

  <!-- T2: green — SAFE (top-right) -->
  <g filter="url(#shadow)">
    <circle cx="800" cy="295" r="92" fill="#27ae60" opacity="0.95"/>
  </g>
  <text x="800" y="268" text-anchor="middle" font-size="11" font-weight="700" fill="#fff" letter-spacing="2">THRUST 2</text>
  <text x="800" y="295" text-anchor="middle" font-size="22" font-weight="800" fill="#fff">SAFE</text>
  <text x="800" y="321" text-anchor="middle" font-size="12" fill="#fff" opacity="0.95">Mixed-monotone</text>
  <text x="800" y="338" text-anchor="middle" font-size="12" fill="#fff" opacity="0.95">reachability + GP-Tube</text>

  <!-- T3: blue — CYBER (bottom) -->
  <g filter="url(#shadow)">
    <circle cx="600" cy="590" r="92" fill="#2980b9" opacity="0.95"/>
  </g>
  <text x="600" y="563" text-anchor="middle" font-size="11" font-weight="700" fill="#fff" letter-spacing="2">THRUST 3</text>
  <text x="600" y="590" text-anchor="middle" font-size="22" font-weight="800" fill="#fff">CYBER-SECURE</text>
  <text x="600" y="616" text-anchor="middle" font-size="12" fill="#fff" opacity="0.95">STL runtime assurance</text>
  <text x="600" y="633" text-anchor="middle" font-size="12" fill="#fff" opacity="0.95">+ model inoculation</text>

  <!-- connectors -->
  <g stroke-width="3" fill="none" stroke-linecap="round">
    <line x1="471" y1="345" x2="533" y2="385" stroke="#c0392b"/>
    <line x1="729" y1="345" x2="667" y2="385" stroke="#27ae60"/>
    <line x1="600" y1="498" x2="600" y2="498" stroke="#2980b9"/>
    <line x1="600" y1="505" x2="600" y2="540" stroke="#2980b9"/>
  </g>

</svg>
