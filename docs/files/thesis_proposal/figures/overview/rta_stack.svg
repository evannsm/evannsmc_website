<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 115 1200 530" font-family="Source Sans Pro, system-ui, sans-serif">
  <defs>
    <filter id="softshadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="3" stdDeviation="5" flood-opacity="0.12"/>
    </filter>
  </defs>

  <!-- outer envelope: T3 cyber -->
  <rect x="110" y="130" width="980" height="500" rx="28" fill="rgba(41,128,185,0.08)" stroke="#2980b9" stroke-width="3"/>
  <rect x="130" y="148" width="180" height="32" rx="6" fill="#2980b9"/>
  <text x="220" y="170" text-anchor="middle" font-size="13" font-weight="700" fill="#fff" letter-spacing="1.3">THRUST 3 · CYBER-SECURE</text>
  <text x="330" y="170" font-size="13" fill="#003057" font-weight="600">STL-RTA monitor · model inoculation · verified backup controller</text>

  <!-- middle envelope: T2 safe -->
  <rect x="180" y="205" width="840" height="360" rx="22" fill="rgba(39,174,96,0.08)" stroke="#27ae60" stroke-width="3"/>
  <rect x="200" y="222" width="150" height="30" rx="6" fill="#27ae60"/>
  <text x="275" y="243" text-anchor="middle" font-size="13" font-weight="700" fill="#fff" letter-spacing="1.3">THRUST 2 · SAFE</text>
  <text x="370" y="243" font-size="13" fill="#003057" font-weight="600">mixed-monotone reachability · RTD-RAX · GP-Tube</text>

  <!-- inner envelope: T1 efficient -->
  <rect x="250" y="280" width="700" height="220" rx="18" fill="rgba(192,57,43,0.08)" stroke="#c0392b" stroke-width="3"/>
  <rect x="270" y="297" width="180" height="30" rx="6" fill="#c0392b"/>
  <text x="360" y="318" text-anchor="middle" font-size="13" font-weight="700" fill="#fff" letter-spacing="1.3">THRUST 1 · EFFICIENT</text>
  <text x="470" y="318" font-size="13" fill="#003057" font-weight="600">Newton–Raphson tracking controller</text>

  <!-- plant block at core -->
  <g filter="url(#softshadow)">
    <rect x="490" y="365" width="220" height="110" rx="12" fill="#fff" stroke="#003057" stroke-width="2.5"/>
  </g>
  <text x="600" y="395" text-anchor="middle" font-size="14" font-weight="700" fill="#003057">PLANT</text>
  <text x="600" y="418" text-anchor="middle" font-size="12" fill="#516470">quadrotor · blimp</text>
  <text x="600" y="442" text-anchor="middle" font-size="11" fill="#7a8894" font-style="italic">f(x,u) + d(t),  with</text>
  <text x="600" y="458" text-anchor="middle" font-size="11" fill="#7a8894" font-style="italic">uncertainty &amp; attacks</text>

  <!-- signal arrows: controller → plant → feedback -->
  <g stroke="#003057" stroke-width="2" fill="none" marker-end="url(#arr)">
    <path d="M 270 420 Q 380 420 490 420"/>
    <path d="M 710 420 Q 820 420 930 420 L 930 540 L 270 540 L 270 475"/>
  </g>
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#003057"/>
    </marker>
  </defs>
  <text x="380" y="410" font-size="11" fill="#003057" font-style="italic">u</text>
  <text x="820" y="410" font-size="11" fill="#003057" font-style="italic">x</text>

</svg>
